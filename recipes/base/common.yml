modules:
  - type: signing
  - type: files
    files:
      - source: system
        destination: / # copies files/system/* (* means everything inside it) into your image's root folder /

  # Install fish
  - type: dnf
    repos:
      copr:
        - atim/starship
    install:
      packages:
        - fish
        - starship

  # Install common packages
  - type: dnf
    install:
      skip-unavailable: true
      packages:
        - btrfsmaintenance
        - hdparm
        - lm_sensors
        - rsync
