modules:
  - type: signing
  - type: files
    files:
      - source: system
        destination: / # copies files/system/* (* means everything inside it) into your image's root folder /

  # Enable per-user dotfile provisioning via /usr/share/user-tmpfiles.d/
  - type: script
    scripts:
      - enable-user-tmpfiles.sh

  # Install fish
  - type: dnf
    repos:
      copr:
        - atim/starship
    install:
      packages:
        - fish
        - fastfetch
        - starship

  # Install common packages
  - type: dnf
    install:
      packages:
        - btrfsmaintenance
        - hdparm
        - lm_sensors
        - rclone
        - rsync

  # Install common justfiles
  - type: justfiles
    validate: true
    install: true
    include:
      - common
