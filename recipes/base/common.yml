modules:
  - type: signing
  - type: files
    files:
      - source: system
        destination: / # copies files/system/* (* means everything inside it) into your image's root folder /

  # Install fish
  - type: dnf
    repos:
      copr:
        - atim/starship
    install:
      packages:
        - fish
        - fastfetch
        - starship

  # Install common packages
  - type: dnf
    install:
      packages:
        - btrfsmaintenance
        - hdparm
        - lm_sensors
        - rclone
        - rsync

  # Install common justfiles
  - type: justfiles
    validate: true
    install: true
    include:
      - firacode-nerd-fonts.just
      - luks-ssd-flags.just
